# ============================================================
# ARMY ORDERS - Конфигурация
# ============================================================

# Должности игроков (не менять вручную!)
positions: {}

# Время службы игроков в секундах (не менять вручную!)
service-time: {}

# Настройки званий (время в секундах)
ranks:
  private: 0           # Рядовой
  private_first: 3600   # Ефрейтор (1 час)
  corporal: 18000       # Капрал (5 часов)
  sergeant: 43200       # Сержант (12 часов)
  senior_sergeant: 86400    # Ст. Сержант (24 часа)
  lieutenant: 172800   # Лейтенант (48 часов)
  senior_lieutenant: 345600   # Ст. Лейтенант (96 часов)
  captain: 604800      # Капитан (168 часов = 7 дней)
  major: 1080000       # Майор (300 часов)
  colonel: 1800000      # Полковник (500 часов)
  general: 2880000     # Генерал (800 часов)

# Настройки приказов
orders:
  # Длительность по умолчанию (в секундах)
  default_duration: 600  # 10 минут
  
  # Доступные типы приказов
  types:
    - sit          # Присесть
    - stand        # Стоять смирно
    - march        # Маршировать
    - run          # Бегать

# Сообщения
messages:
  prefix: "&6[Army]&r"
  
  order_given: "&a✓ &7Приказ '{type}' выдан игроку {player}"
  order_completed: "&a✓ &7Приказ выполнен! +1 час службы"
  order_failed: "&c✗ &7Приказ не выполнен!"
  
  position_given: "&e⚔ &7{player} назначен на должность {position}"
  position_taken: "&c⚔ &7{player} снят с должности"
  
  no_permission: "&c✗ &7У вас нет прав!"
  player_not_found: "&c✗ &7Игрок не найден!"

# BossBar/ActionBar
display:
  # Показывать приказ в ActionBar
  actionbar_enabled: true
  
  # Интервал обновления (тики)
  update_interval: 20
